<div class="verification-content">
  @if (section() === 'property') {
    <app-property-verifications />
  } @else if (section() === 'user') {
    <app-user-verifications />
  } @else if (section() === 'lease') {
    <app-lease-verifications />
  } @else if (section() === 'signed-lease') {
    <app-signed-lease-verifications />
  } @else if (section() === 'cancellation-template') {
    <app-cancellation-verifications />
  } @else if (section() === 'cancellation-signed') {
    <app-signed-cancellation-verifications />
  }
</div>
