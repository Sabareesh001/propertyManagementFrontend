<div class="layout">
  <header class="topbar">
    <!-- Mobile hamburger -->
    <p-button
      class="menu-toggle"
      icon="pi pi-bars"
      severity="secondary"
      [text]="true"
      (onClick)="drawerVisible = true"
    />

    <div class="topbar-logo">
      <span class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
      </span>
      <span class="logo-text">PropManage</span>
    </div>

    <!-- Desktop tabs -->
    @if (!isAdmin()) {
      <p-tabs [value]="activeTab" class="topbar-tabs" (valueChange)="navigateTab($any($event))">
        <p-tablist>
          <p-tab value="0"><i class="pi pi-home"></i> Dashboard</p-tab>
          @if (isOwner()) {
            <p-tab value="1"><i class="pi pi-building"></i> My Properties</p-tab>
          }
        </p-tablist>
      </p-tabs>
    }

    <div class="topbar-profile">
      <p-button
        [icon]="themeService.isDark() ? 'pi pi-sun' : 'pi pi-moon'"
        severity="secondary"
        [text]="true"
        size="large"
        [rounded]="true"
        (onClick)="themeService.toggle()"
        [attr.aria-label]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
      />
      <p-splitbutton
        label="Profile"
        icon="pi pi-user"
        [model]="profileMenuItems"
        severity="secondary"
        size="large"
      />
    </div>
  </header>

  <!-- Mobile drawer -->
  <p-drawer [(visible)]="drawerVisible" header="Menu" position="left" styleClass="mobile-drawer">
    <nav class="drawer-nav">
      @if (isAdmin()) {
        <p-panelmenu [model]="adminMenuItems()" styleClass="drawer-panelmenu" />
      } @else {
        @for (item of navItems(); track item.label) {
          <button class="drawer-nav-item" (click)="navigateDrawerItem(item.route)">
            <i [class]="item.icon"></i>
            <span>{{ item.label }}</span>
          </button>
        }
      }
    </nav>
    <div class="drawer-footer">
      <p-button
        label="Logout"
        icon="pi pi-sign-out"
        severity="danger"
        [text]="true"
        (onClick)="logout()"
      />
    </div>
  </p-drawer>

  <div class="main-area">
    @if (showAdminSidebar()) {
      <aside class="admin-sidebar">
        <p-panelmenu [model]="adminMenuItems()" styleClass="admin-panelmenu" />
      </aside>
    }
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
